    <style>
        :root {
            --primary: #FF6B00;
            --primary-dark: #E55A00;
            --primary-light: #FF8533;
            --secondary: #0047AB;
            --accent: #10B981;

        * {

        }

            color: var(--light);
            line-height: 1.6;

            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 71, 171, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), transparent);
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .floating-orb:nth-child(1) { width: 300px; height: 300px; top: -150px; left: -150px; animation-delay: 0s; }
        .floating-orb:nth-child(2) { width: 200px; height: 200px; top: 50%; right: -100px; animation-delay: 5s; }
        .floating-orb:nth-child(3) { width: 150px; height: 150px; bottom: 10%; left: 20%; animation-delay: 10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Header */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--primary);
            text-decoration: none;
        }

        .header-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;

        .icon-btn {

            height: 40px;

        function renderStandings() {
            const tbody = document.getElementById('standingsBody');
            const miniTbody = document.getElementById('miniStandings');
            
            // Calculate standings from match results
            updateStandingsFromMatches();
            
            // Sort by points, then goal difference
            const sorted = [...DataStore.teams].sort((a, b) => {
                if (b.stats.pts !== a.stats.pts) return b.stats.pts - a.stats.pts;
                return (b.stats.gf - b.stats.ga) - (a.stats.gf - a.stats.ga);
            });
            
            const renderRow = (team, index, isMini = false) => {
                const posClass = index < 3 ? `position-${index + 1}` : 'position-other';
                const gd = team.stats.gf - team.stats.ga;
                
                if (isMini && index >= 3) return '';
                
                return `
                    <tr>
                        <td><div class="position-badge ${posClass}">${index + 1}</div></td>
                        <td>
                            <div class="team-cell">
                                <div class="team-cell-logo">${team.logo}</div>
                                <div class="team-cell-info">
                                    <div class="team-cell-name">${team.name}</div>
                                    ${!isMini ? `<div class="team-cell-abbr">${team.abbr}</div>` : ''}
                                </div>
                            </div>
                        </td>
                        ${!isMini ? `
                            <td class="stats-cell">${team.stats.p}</td>
                            <td class="stats-cell">${team.stats.w}</td>
                            <td class="stats-cell">${team.stats.d}</td>
                            <td class="stats-cell">${team.stats.l}</td>
                            <td class="stats-cell">${team.stats.gf}</td>
                            <td class="stats-cell">${team.stats.ga}</td>
                            <td class="stats-cell">${gd > 0 ? '+' : ''}${gd}</td>
                        ` : ''}
                        <td class="points-cell">${team.stats.pts}</td>
                    </tr>
                `;
            };
            
            if (tbody) {
                tbody.innerHTML = sorted.map((team, i) => renderRow(team, i)).join('');
            }
            if (miniTbody) {
                miniTbody.innerHTML = sorted.map((team, i) => renderRow(team, i, true)).join('');
            }
        }

        function renderPlayers() {
            const container = document.getElementById('playersGrid');
            if (!container) return;
            
            const sorted = [...DataStore.players].sort((a, b) => (b.goals || 0) - (a.goals || 0));
            
            container.innerHTML = sorted.map(player => {
                const team = DataStore.teams.find(t => t.id === player.team);
                return `
                    <div class="player-card" onclick="showPlayerDetail(${player.id})">
                        <div class="player-avatar">👤</div>
                        <div class="player-name">${player.name}</div>
                        <div class="player-team">${team?.name || 'Unknown'} • ${player.position}</div>
                        <div class="player-stats">
                            <div class="player-stat">
                                <div class="player-stat-value">${player.goals || 0}</div>
                                <div class="player-stat-label">Goals</div>
                            </div>
                            <div class="player-stat">
                                <div class="player-stat-value">${player.assists || 0}</div>
                                <div class="player-stat-label">Assists</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderNews() {
            const container = document.getElementById('newsList');
            if (!container) return;
            
            const sorted = [...DataStore.news].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = sorted.map(news => `
                <div class="news-card" onclick="showNewsDetail(${news.id})">
                    <div class="news-image">
                        📰
                        ${news.author === 'Official' ? '<span class="news-badge">✓ Official</span>' : ''}
                    </div>
                    <div class="news-content">
                        <div class="news-date">${formatDate(news.date)}</div>
                        <div class="news-title">${news.title}</div>
                        <div class="news-excerpt">${news.content.substring(0, 120)}...</div>
                    </div>
                </div>
            `).join('');
        }

        function renderActivity() {
            const container = document.getElementById('activityFeed');
            if (!container) return;
            
            const activities = [
                { user: 'Ahmed H.', action: 'joined Lamu Queens vs 11 Brothers', time: '2 min ago' },

                { user: 'Coach Juma', action: 'updated team lineup', time: '12 min ago' },

        function renderUpcoming() {
            const container = document.getElementById('upcomingList');
            if (!container) return;
            
            const upcoming = DataStore.matches
                .filter(m => m.status === 'upcoming')
                .slice(0, 3);
            
            if (upcoming.length === 0) {
                container.innerHTML = '<p style="color: var(--gray); text-align: center;">No upcoming matches</p>';
                return;
            }
            
            container.innerHTML = upcoming.map(match => {
                const home = DataStore.teams.find(t => t.id === match.home);
                const away = DataStore.teams.find(t => t.id === match.away);
                
                return `
                    <div style="display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: rgba(255, 107, 0, 0.05); border-radius: 10px; margin-bottom: 0.5rem;">
                        <div style="font-size: 1.5rem;">${home?.logo} vs ${away?.logo}</div>
                        <div style="flex: 1;">
                            <div style="font-weight: 600; font-size: 0.875rem;">${home?.name} vs ${away?.name}</div>
                            <div style="font-size: 0.75rem; color: var(--gray);">${formatDate(match.date)} • ${match.time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const totalGoals = DataStore.teams.reduce((sum, t) => sum + t.stats.gf, 0);
            const liveMatches = DataStore.matches.filter(m => m.status === 'live').length;
            
            // Update any stat displays
            const statElements = {
                'statTeams': DataStore.teams.length,
                'statMatches': DataStore.matches.length,
                'statPlayers': DataStore.players.length,
                'statGoals': totalGoals
            };
            
            Object.entries(statElements).forEach(([id, value]) => {
                const el = document.getElementById(id);
                if (el) el.textContent = value;
            });
            
            // Show/hide live banner
            const liveBanner = document.getElementById('liveBanner');
            if (liveBanner) {
                if (liveMatches > 0) {
                    liveBanner.classList.remove('hidden');
                    const liveMatch = DataStore.matches.find(m => m.status === 'live');
                    if (liveMatch) {
                        const home = DataStore.teams.find(t => t.id === liveMatch.home);
                        const away = DataStore.teams.find(t => t.id === liveMatch.away);
                        document.getElementById('liveMatchText').textContent = `${home?.name} vs ${away?.name}`;
                        document.getElementById('liveScore').textContent = `${liveMatch.homeScore} - ${liveMatch.awayScore}`;
                    }
                } else {
                    liveBanner.classList.add('hidden');
                }
            }
        }

        function populateSelects() {
            const teamOptions = DataStore.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            
            const selects = ['matchHomeTeam', 'matchAwayTeam', 'playerTeam', 'scoreMatchSelect'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (id === 'scoreMatchSelect') {
                        el.innerHTML = DataStore.matches.map(m => {
                            const home = DataStore.teams.find(t => t.id === m.home);
                            const away = DataStore.teams.find(t => t.id === m.away);
                            return `<option value="${m.id}">${home?.name} vs ${away?.name}</option>`;
                        }).join('') || '<option>No matches</option>';
                    } else {
                        el.innerHTML = teamOptions;
                    }
                }
            });
        }

        // Admin Functions
        function addMatch() {
            const home = parseInt(document.getElementById('matchHomeTeam').value);
            const away = parseInt(document.getElementById('matchAwayTeam').value);
            const date = document.getElementById('matchDate').value;
            const time = document.getElementById('matchTime').value;
            const venue = document.getElementById('matchVenue').value;
            
            if (home === away) {
                showToast('Home and away teams must be different', 'error');
                return;
            }
            
            if (!date) {
                showToast('Please select a date', 'error');
                return;
            }
            
            const newMatch = {
                id: Date.now(),
                home, away, date, time, venue,
                status: 'upcoming',
                homeScore: 0,
                awayScore: 0,
                joiners: []
            };
            
            DataStore.matches.push(newMatch);
            saveData();
            renderAll();
            hideModal('addMatchModal');
            showToast('Match scheduled successfully!');
        }

        function updateScore() {
            const matchId = parseInt(document.getElementById('scoreMatchSelect').value);
            const homeScore = parseInt(document.getElementById('scoreHome').value) || 0;
            const awayScore = parseInt(document.getElementById('scoreAway').value) || 0;
            const status = document.getElementById('scoreStatus').value;
            
            const match = DataStore.matches.find(m => m.id === matchId);
            if (!match) {
                showToast('Match not found', 'error');
                return;
            }
            
            const oldStatus = match.status;
            match.homeScore = homeScore;
            match.awayScore = awayScore;
            match.status = status;
            
            // Update team stats if match finished
            if (status === 'finished' && oldStatus !== 'finished') {
                updateTeamStats(match);
            }
            
            saveData();
            renderAll();
            hideModal('updateScoreModal');
            showToast('Score updated!');
        }

        function updateTeamStats(match) {
            const home = DataStore.teams.find(t => t.id === match.home);
            const away = DataStore.teams.find(t => t.id === match.away);
            
            if (!home || !away) return;
            
            home.stats.p++;
            away.stats.p++;
            home.stats.gf += match.homeScore;
            home.stats.ga += match.awayScore;
            away.stats.gf += match.awayScore;
            away.stats.ga += match.homeScore;
            
            if (match.homeScore > match.awayScore) {
                home.stats.w++;
                away.stats.l++;
                home.stats.pts += 3;
            } else if (match.homeScore < match.awayScore) {
                home.stats.l++;
                away.stats.w++;
                away.stats.pts += 3;
            } else {
                home.stats.d++;
                away.stats.d++;
                home.stats.pts += 1;
                away.stats.pts += 1;
            }
        }

        function updateStandingsFromMatches() {
            // Reset all stats
            DataStore.teams.forEach(t => {
                t.stats = { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 };
            });
            
            // Recalculate from finished matches
            DataStore.matches.filter(m => m.status === 'finished').forEach(match => {
                updateTeamStats(match);
            });
        }

            const number = parseInt(document.getElementById('playerNumber').value);

            const title = document.getElementById('newsTitle').value.trim();
            const content = document.getElementById('newsContent').value.trim();

        // User Actions
        function joinMatch(matchId) {
            if (!DataStore.currentUser) {
                showModal('loginModal');
                return;
            }
            
            const match = DataStore.matches.find(m => m.id === matchId);
            if (!match) return;
            
            if (!match.joiners) match.joiners = [];
            
            if (match.joiners.includes(DataStore.currentUser.name)) {
                showToast('You already joined this match!');
                return;
            }
            
            match.joiners.push(DataStore.currentUser.name);
            saveData();
            renderAll();
            showToast('You joined the match!');
        }

            if (!DataStore.currentUser) {

            const match = DataStore.matches.find(m => m.id === matchId);
            if (!match) return;
            
            const home = DataStore.teams.find(t => t.id === match.home);
            const away = DataStore.teams.find(t => t.id === match.away);
            
            const text = `🏆 ${home?.name} vs ${away?.name}\n📅 ${formatDate(match.date)} • ${match.time}\n📍 ${match.venue}\n\nvia Lamu Sports Hub`;

                navigator.share({ title: 'Lamu Sports Hub', text });

                navigator.clipboard.writeText(text);

            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .online-count {
            font-size: 0.875rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Match Cards */
        .match-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 107, 0, 0.15);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
            position: relative;
            transition: all 0.3s;
        }

        .match-card.live {
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .match-card:hover {
            border-color: rgba(255, 107, 0, 0.3);
        }

        .match-status-badge {
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.375rem 1rem;
            border-radius: 0 0 12px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .match-status-badge.upcoming {
            background: var(--gray);
            color: white;
        }

        .match-status-badge.live {
            background: var(--danger);
            color: white;
            animation: pulse 2s infinite;
        }

        .match-status-badge.finished {
            background: var(--accent);
            color: white;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1rem 0;
        }

        .match-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }

        .team-badge {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .team-name {
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
        }

        .match-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem;
        }

        .match-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        .match-score.live {
            color: var(--danger);
        }

        .match-time {
            margin-top: 0.5rem;
            padding: 0.375rem 1rem;
            background: rgba(255, 107, 0, 0.1);
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
        }

        .match-time.live {
            background: var(--danger);
            color: white;
        }

        .match-meta {
            text-align: center;
            color: var(--gray);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .match-actions {
            display: flex;
            gap: 0.75rem;
        }

        .match-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 12px;
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .match-btn-primary {
            background: var(--primary);
            color: white;
        }

        .match-btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .match-btn-secondary {
            background: rgba(255, 107, 0, 0.1);
            color: var(--primary);
            border: 1px solid rgba(255, 107, 0, 0.2);
        }

        .match-btn-secondary:hover {
            background: rgba(255, 107, 0, 0.2);
        }

        /* Team List */
        .team-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 107, 0, 0.15);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .team-item:hover {
            border-color: var(--primary);
            transform: translateX(8px);
        }

        .team-item-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            flex-shrink: 0;
        }

        .team-item-info {
            flex: 1;
        }

        .team-item-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .team-item-meta {
            font-size: 0.875rem;
            color: var(--gray);
        }

        .team-item-stats {
            text-align: right;
        }

        .team-item-points {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
        }

        .team-item-label {
            font-size: 0.75rem;
            color: var(--gray);
        }
